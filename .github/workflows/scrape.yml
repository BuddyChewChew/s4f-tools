name: Daily Scrape & Update

on:
  schedule:
    - cron: '0 4 * * *'           # Runs daily at 4 AM UTC
  workflow_dispatch:              # Manual trigger from Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0            # Full history for proper git operations

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22          # Current LTS, avoids Node 20 deprecation
          cache: 'npm'              # Caches ~/.npm for faster & more stable installs

      - name: Install dependencies (with retry on failure)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 8
          max_attempts: 4           # Retries up to 4 times if integrity/network fails
          retry_on: error
          command: |
            npm cache clean --force
            npm install --no-audit --no-fund --prefer-offline || npm install --no-audit --no-fund

      - name: Run scraper script
        run: npm start
        # If your script file is named differently → change to: node s4f-scraper.js

      - name: Commit and push any changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Stage files generated by the scraper
          git add s4f/* || true

          # Commit only if there are actual changes (prevents empty commits)
          git diff --staged --quiet || git commit -m "Daily update: new channels/EPG/playlist - $(date +'%Y-%m-%d %H:%M UTC')"

          # Push (fails silently if nothing to push)
          git push || echo "Nothing new to push or push skipped"
