name: Daily Scrape & Update

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'  # Cache yarn instead

      - name: Install dependencies with yarn
        run: |
          rm -rf node_modules || true
          yarn install --force --non-interactive --check-files

      - name: Run scraper
        run: node s4f-scraper.js  # Direct call to avoid "start" script issues

      - name: Commit changes if any
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"

          git add s4f/* || true

          if ! git diff --staged --quiet; then
            git commit -m "Daily update: $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes detected"
          fi
