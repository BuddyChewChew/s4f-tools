name: Daily Scrape & Update

on:
  schedule:
    - cron: '0 4 * * *'           # Daily at 4 AM UTC
  workflow_dispatch:              # Manual run button

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0            # Full git history for commits

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Clean previous installs and cache
        run: |
          rm -rf node_modules
          npm cache clean --force

      - name: Install dependencies
        run: npm ci || npm install --no-audit --no-fund
        # Fallback to npm install if ci fails (e.g. no perfect lockfile)

      - name: Run scraper
        run: npm start
        # Change to node s4f-scraper.js if your package.json "start" script differs

      - name: Commit updated files if any
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          git add s4f/* || true
          
          # Commit only if changes exist (avoids errors on no-op)
          git diff --staged --quiet || git commit -m "Daily update $(date +'%Y-%m-%d %H:%M UTC')"
          
          git push || echo "No push needed or skipped"
