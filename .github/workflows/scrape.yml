name: Daily Scrape & Update

on:
  schedule:
    - cron: '0 4 * * *'  # Daily ~4 AM UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git commit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Clean npm environment thoroughly
        run: |
          rm -rf node_modules .npm/_cacache/tmp .npm/_cacache/content-v2 || true
          npm cache clean --force

      - name: Install dependencies (force override conflicts)
        run: npm install --no-audit --no-fund --force

      - name: Run scraper
        run: npm start

      - name: Commit and push changes if any
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"

          git add s4f/* || true

          # Commit only if actual changes
          if ! git diff --staged --quiet; then
            git commit -m "Daily update: $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No new data/changes to commit"
          fi
