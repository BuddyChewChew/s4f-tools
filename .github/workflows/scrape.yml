name: Daily Scrape & Update

on:
  schedule:
    - cron: '0 4 * * *'  # 4 AM UTC daily
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Aggressive clean before install
        run: |
          rm -rf node_modules || true
          rm -rf .npm/_cacache/tmp || true  # clear npm temp dirs if any
          npm cache clean --force

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund --force || npm install --no-audit --no-fund
          # --force helps override rename conflicts in stubborn cases

      - name: Run the scraper
        run: npm start

      - name: Commit & push updates (if any)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add s4f/* || true
          
          # Check if staged changes exist before commit
          if ! git diff --staged --quiet; then
            git commit -m "Daily playlist/EPG/data update - $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to commit"
          fi
