name: Daily Scrape & Update

on:
  schedule:
    - cron: '0 4 * * *'           # every day at 4 AM UTC
  workflow_dispatch:              # allows manual trigger from Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0            # needed for git commit to work properly

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22          # newer LTS → avoids deprecation warning
          cache: 'npm'              # caches node_modules + tarballs → faster & more stable

      - name: Clean npm cache & install dependencies
        run: |
          npm cache clean --force
          npm install --no-audit --no-fund || npm install --no-audit --no-fund
        # The || fallback helps if first attempt fails due to transient network issues

      - name: Run the scraper
        run: npm start
        # If your script is named differently, change to: node s4f-scraper.js

      - name: Commit and push updated files
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          
          # Stage all changes in s4f/ folder (created by your script)
          git add s4f/* || true
          
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "Daily update: $(date +'%Y-%m-%d %H:%M UTC')"
          
          # Push (will fail silently if no commit happened)
          git push || echo "No changes to push or push failed"
