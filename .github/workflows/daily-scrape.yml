name: Daily Scrape & Update

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-22.04          # ← changed from latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - basic environment check
        run: |
          echo "Current directory: $(pwd)"
          ls -la
          echo "Node version before setup: $(node --version || echo 'node not found')"
          echo "npm version before setup: $(npm --version || echo 'npm not found')"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Debug: Node & npm versions after setup
        run: |
          node --version
          npm --version
          npm config list

      - name: Clean everything before install
        run: |
          rm -rf node_modules .npm || true
          npm cache clean --force

      - name: Install dependencies - maximum debug
        run: |
          echo "NPM config before install:"
          npm config list
          echo "Cleaning cache again..."
          npm cache clean --force || true
          echo "Starting install..."
          npm install --no-audit --no-fund --verbose --loglevel=verbose || {
            echo "Install failed - showing cache contents:"
            ls -la ~/.npm || true
            echo "Trying plain install..."
            npm install || true
            exit 1
          }

      - name: Run scraper
        run: npm start

      - name: Commit files if changed
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add s4f/* || true
          git diff --staged --quiet || git commit -m "Daily update $(date +'%Y-%m-%d')"
          git push || echo "No push or skipped"
